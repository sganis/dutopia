version: 2
updates:
  - package-ecosystem: cargo
    directory: /rs
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
    ignore:
      # rand 0.7.x is pulled in transitively by tauri-utils -> kuchikiki ->
      # selectors 0.24.0 -> phf_codegen 0.8.0 -> phf_generator 0.8.0.
      # It runs only at compile time (PHF hashing) and cannot be bumped
      # without an upstream Tauri release. Re-evaluate when Tauri drops
      # kuchikiki or upgrades selectors.
      - dependency-name: rand
        versions: ["< 0.8.6"]

  - package-ecosystem: npm
    directory: /browser
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /python
    schedule:
      interval: weekly
