<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Dutopia">
  <title>Dutopia</title>
  <!--
    Donut: three age-bucket segments (recent / mid / old).
    Geometry: cx=cy=16, r=12, stroke-width=6  =>  circumference = 2*pi*12 = 75.398.
    Segments are 50% / 30% / 20% drawn clockwise from 12 o'clock.
  -->
  <g transform="rotate(-90 16 16)" fill="none" stroke-width="6" stroke-linecap="butt">
    <circle cx="16" cy="16" r="12" stroke="#10b981" stroke-dasharray="37.7 75.4"/>
    <circle cx="16" cy="16" r="12" stroke="#f59e0b" stroke-dasharray="22.6 75.4" stroke-dashoffset="-37.7"/>
    <circle cx="16" cy="16" r="12" stroke="#64748b" stroke-dasharray="15.1 75.4" stroke-dashoffset="-60.3"/>
  </g>
</svg>
